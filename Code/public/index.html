<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05060a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="600">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>600</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="screen-title">600</h1>
    <button id="btn-signout" type="button" title="Abmelden" aria-label="Abmelden" style="display:none">⎋</button>
  </header>

  <main id="view"></main>

  <!-- Login gate: covers the app until the user signs in (cross-device sync). -->
  <div id="auth-overlay" role="dialog" aria-modal="true" aria-label="Anmelden">
    <div class="auth-card">
      <div class="auth-logo">🧘</div>
      <h2>600</h2>
      <p>Melde dich an, um deine Sitzungen geräteübergreifend zu synchronisieren.</p>
      <button id="btn-login" type="button">Mit Google anmelden</button>
      <p id="auth-who" class="auth-who"></p>
    </div>
  </div>

  <nav id="tabbar">
    <a href="#dashboard" data-route="dashboard" data-icon="○"><span>Path</span></a>
    <a href="#timer"     data-route="timer"     data-icon="◐"><span>Sit</span></a>
    <a href="#history"   data-route="history"   data-icon="≡"><span>Log</span></a>
  </nav>

  <!-- Firebase SDK (vendored locally so the PWA stays offline-capable) -->
  <script src="vendor/firebase-app-compat.js"></script>
  <script src="vendor/firebase-auth-compat.js"></script>
  <script src="vendor/firebase-firestore-compat.js"></script>
  <script src="vendor/firebase-messaging-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-init.js"></script>
  <script src="messaging.js"></script>
  <script src="settings.js"></script>

  <script src="storage.js"></script>
  <script src="modules/timer.js"></script>
  <script src="modules/log.js"></script>
  <script src="modules/history.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="modules/plan.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Auto-update: when a new service worker takes control (after a deploy),
      // reload once so the latest version is shown without a manual relaunch.
      // Guarded so the very first install (no prior controller) doesn't reload.
      if (navigator.serviceWorker.controller) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          location.reload();
        });
      }
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
