name: Daily meditation reminder

on:
  schedule:
    # GitHub cron is UTC. 06:05 UTC ≈ 08:05 CEST, 18:05 UTC ≈ 20:05 CEST.
    # Odd minute (not :00) dodges GitHub's congested top-of-hour queue; the
    # script then adds a 0–12 min random jitter so it's not robotic and doesn't
    # pile up with the sport app (which is staggered to :25).
    - cron: '5 6,18 * * *'
  workflow_dispatch: {} # allows manual "Run workflow" for testing

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-admin
        run: npm install firebase-admin@^12
      - name: Send reminders
        env:
          FCM_SERVICE_ACCOUNT: ${{ secrets.FCM_SERVICE_ACCOUNT }}
        run: node scripts/send-reminders.mjs
