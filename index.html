<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05060a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="600">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>600</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="screen-title">600</h1>
  </header>

  <main id="view"></main>

  <nav id="tabbar">
    <a href="#dashboard" data-route="dashboard" data-icon="○"><span>Path</span></a>
    <a href="#timer"     data-route="timer"     data-icon="◐"><span>Sit</span></a>
    <a href="#history"   data-route="history"   data-icon="≡"><span>Log</span></a>
  </nav>

  <script src="storage.js"></script>
  <script src="modules/timer.js"></script>
  <script src="modules/log.js"></script>
  <script src="modules/history.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
